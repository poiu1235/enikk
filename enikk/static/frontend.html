<!DOCTYPE html>
<html lang="zh" x-data="chatApp()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enikk - Gaming Agent</title>
  <script src="/static/vendor/alpinejs.min.js" defer></script>
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/vendor/highlight.min.js"></script>
  <link rel="stylesheet" href="/static/vendor/highlight-github.min.css" />
  <script src="/static/vendor/tailwind.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sidebar:  '#f1f2f4',
            main:     '#f8f9fa',
            input:    '#eeeff1',
            border:   '#e3e5e8',
            accent:   '#10a37f',
            hover:    '#e8eaed',
            msguser:  '#eaecef',
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/vendor/inter.css" />
  <style>
    * { box-sizing: border-box; user-select: text; -webkit-user-select: text; }
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c2c5c9; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9da0a5; }

    /* Sidebar collapse transition */
    #sidebar {
      transition: width 0.25s cubic-bezier(.4,0,.2,1), min-width 0.25s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    #sidebar.collapsed { width: 0 !important; min-width: 0 !important; }
    #sidebar-inner { width: 256px; min-width: 256px; }

    .sidebar-item:hover .delete-btn { opacity: 1; }
    .delete-btn { opacity: 0; transition: opacity 0.15s; }

    .typing-dot {
      width: 6px; height: 6px; background: #909498;
      border-radius: 50%; display: inline-block;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .msg-content { line-height: 1.75; font-size: 15px; color: #2a2d30; }
    .msg-content p { margin: 0 0 0.75em; }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-content pre {
      background: #f0f1f3;
      border: 1px solid #dde0e3;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.75em 0;
    }
    .msg-content pre code { padding: 1em 1.2em; display: block; font-size: 13px; background: transparent !important; }
    .msg-content code:not(pre code) {
      background: #e8eaed; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: #c0392b;
    }
    .msg-content ul, .msg-content ol { padding-left: 1.5em; margin: 0.5em 0; }
    .msg-content li { margin: 0.3em 0; }
    .msg-content h1, .msg-content h2, .msg-content h3 { color: #18191c; margin: 1em 0 0.4em; font-weight: 600; }
    .msg-content blockquote {
      border-left: 3px solid #10a37f; margin: 0.75em 0; padding: 0.4em 1em; color: #666b72;
    }
    .msg-content table { border-collapse: collapse; width: 100%; margin: 0.75em 0; }
    .msg-content th, .msg-content td { border: 1px solid #dde0e3; padding: 6px 12px; text-align: left; }
    .msg-content th { background: #e8eaed; }
    .msg-content a { color: #10a37f; text-decoration: underline; }

    /* Error toast */
    .error-toast {
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Image in messages */
    .msg-content img, .msg-img {
      max-width: 100%; border-radius: 10px;
      border: 1px solid #dde0e3; margin: 0.5em 0; display: block;
      cursor: pointer; transition: opacity 0.15s;
    }
    .msg-content img:hover, .msg-img:hover { opacity: 0.92; }

    /* Image lightbox */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.72); z-index: 1000;
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 88vh; border-radius: 10px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
    #lightbox-close {
      position: absolute; top: 20px; right: 24px;
      background: rgba(255,255,255,0.15); border: none;
      color: #fff; font-size: 22px; width: 38px; height: 38px;
      border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #lightbox-close:hover { background: rgba(255,255,255,0.28); }


    textarea { resize: none; outline: none; }
    textarea:focus { outline: none; box-shadow: none; }

    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .sidebar-item.active { background: #dce0e5; }
    .sidebar-item:hover { background: #e2e5ea; }
    .new-chat-btn:hover { background: #e2e5ea; }

    .action-btn { transition: background 0.15s, color 0.15s; border-radius: 8px; }
    .action-btn:hover { background: #e2e5ea; }

    .input-area {
      background: #e8eaed;
      border: 1px solid #dde0e3;
      border-radius: 16px;
      transition: border-color 0.15s;
    }
    .input-area:focus-within { border-color: #b8b2aa; }

    .send-btn { transition: background 0.15s, opacity 0.15s; }
    .send-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { background: #0d8f6f; }

    /* Thinking block */
    .thinking-block {
      border: 1px solid #e3e5e8; border-radius: 10px; margin: 0.5em 0; overflow: hidden;
    }
    .thinking-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; cursor: pointer; user-select: none;
      font-size: 13px; color: #909499; background: #f5f6f8;
      transition: background 0.12s;
    }
    .thinking-header:hover { background: #eeeff1; }
    .thinking-header .chevron { transition: transform 0.2s; width: 14px; height: 14px; }
    .thinking-block.open .thinking-header .chevron { transform: rotate(90deg); }
    .thinking-body {
      display: none; padding: 12px 14px; font-size: 13px; color: #666b72;
      line-height: 1.7; white-space: pre-wrap; background: #fafbfc;
      border-top: 1px solid #e3e5e8;
    }
    .thinking-block.open .thinking-body { display: block; }

    /* Tool call block */
    .toolcall-block {
      border: 1px solid #bfd4f7; border-radius: 10px; margin: 0.5em 0; overflow: hidden;
    }
    .toolcall-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; cursor: pointer; user-select: none;
      font-size: 13px; background: #edf3fc; color: #3b66a0;
      transition: background 0.12s;
    }
    .toolcall-header:hover { background: #e2ebf9; }
    .toolcall-header .tool-icon { width: 15px; height: 15px; flex-shrink: 0; }
    .toolcall-header .chevron { transition: transform 0.2s; width: 14px; height: 14px; margin-left: auto; }
    .toolcall-block.open .toolcall-header .chevron { transform: rotate(90deg); }
    .toolcall-body {
      display: none; padding: 12px 14px; font-size: 13px; color: #555;
      line-height: 1.7; white-space: pre-wrap; background: #f8faff;
      border-top: 1px solid #d8e4f7; max-height: 300px; overflow-y: auto;
    }
    .toolcall-block.open .toolcall-body { display: block; }

    .sidebar-section-label {
      font-size: 10.5px; color: #909499; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 12px 4px;
    }

    /* Collapsed sidebar — show icon-only toggle button */
    #sidebar-toggle-floating {
      display: none; position: absolute; top: 14px; left: 12px; z-index: 10;
    }
    body.sidebar-collapsed #sidebar-toggle-floating { display: flex; }
    body.sidebar-collapsed #main-content { padding-left: 0; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-12px); }
      20%, 40%, 60%, 80% { transform: translateX(12px); }
    }
    #config-modal-content.shake { animation: shake 0.5s ease-in-out; }
  </style>
</head>
<body class="bg-main text-gray-800 flex h-screen overflow-hidden relative">

<script>
// i18n initialization - translations inlined to avoid race condition
const translations = {

      im_status: '即时通讯连接状态', connected: '已连接', disconnected: '未连接',
      dashboard: '控制台', refresh: '刷新', open_home: '打开 Home 目录', settings: '设置',
      language: '语言'
    },
    chat: {
      toggle_thinking: '切换思考过程', toggle_tool_calls: '切换工具调用',
      welcome_title: '有什么我可以帮您的？', welcome_subtitle: '开始对话，探索无限可能',
      load_more: '加载更多...', thinking: '思考中...', thought: '思考过程',
      call: '调用', step: '步骤', copy: '复制', message_placeholder: '输入消息...',
      stop: '停止', send: '发送', stop_hint: '发送 "/stop" 停止当前任务'
    },
    time: { today: '今天', yesterday: '昨天', last_7_days: '最近7天', older: '更早' },
    apps: {
      empty: '还没有配置应用', add: '添加应用', edit: '编辑应用',
      name: '名称', path: '路径', advanced: '高级设置',
      launcher_path: '启动器路径', timeout: '启动超时 (秒)',

    },

      launcher_path: 'Launcher Path', timeout: 'Launch Timeout (seconds)',
      name_required: 'Please enter app name', path_required: 'Please select executable file',

    },
    status: {
      icon_finder: 'Icon Finder', im: 'IM', connected: 'Connected', disconnected: 'Disconnected'
    }
  }
};

function resolveLang(lang) {
  if (translations[lang]) return lang;
  const prefix = lang.split('-')[0];
  for (const key of Object.keys(translations)) {
    if (key.startsWith(prefix)) return key;
  }
  console.warn('[i18n] Unsupported language, falling back to default:', lang);
  return null;
}

let currentLang = 'zh-CN';

// Read language from URL parameter (passed by backend)
const urlLang = new URLSearchParams(window.location.search).get('lang');
if (urlLang) {
  const resolved = resolveLang(urlLang);
  if (resolved) {
    currentLang = resolved;
    console.log('[i18n] Loaded language from URL:', currentLang);
  }
}

function t(key, ...args) {
  const keys = key.split('.');
  let value = translations[currentLang];

  for (const k of keys) {
    if (value && typeof value === 'object') {
      value = value[k];
    } else {
      return key;
    }
  }

  if (value === undefined) return key;

  if (args.length > 0 && typeof value === 'string') {
    return value.replace(/\{(\d+)\}/g, (match, index) => {
      return args[parseInt(index)] !== undefined ? args[parseInt(index)] : match;
    });
  }

  return value;
}

function setLang(lang) {
  const resolved = resolveLang(lang);
  if (resolved) {
    currentLang = resolved;
    window.dispatchEvent(new CustomEvent('language-changed'));
  }
}
</script>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
</div>

<!-- Config Modal -->
<div x-show="showConfigModal" x-transition class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" @click.self="shakeModal()">
  <div id="config-modal-content" class="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col" @click.stop>
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-border">
      <h2 class="text-lg font-semibold text-gray-800" x-text="t('config.title')"></h2>
      <button @click="showConfigModal = false" class="text-gray-400 hover:text-gray-600 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="flex-1 flex overflow-hidden" x-show="config">
      <!-- Category sidebar -->
      <div class="w-44 flex-shrink-0 border-r border-border bg-gray-50 py-3 px-2 space-y-1">
        <button @click="configTab = 'basic'" class="w-full text-left px-3 py-2 rounded-lg text-sm transition-colors cursor-pointer" :class="configTab === 'basic' ? 'bg-white text-gray-800 font-medium shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-white/60'" x-text="t('config.tab_basic')"></button>
        <button @click="configTab = 'apps'" class="w-full text-left px-3 py-2 rounded-lg text-sm transition-colors cursor-pointer" :class="configTab === 'apps' ? 'bg-white text-gray-800 font-medium shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-white/60'" x-text="t('config.tab_apps')"></button>
        <button @click="configTab = 'advanced'" class="w-full text-left px-3 py-2 rounded-lg text-sm transition-colors cursor-pointer" :class="configTab === 'advanced' ? 'bg-white text-gray-800 font-medium shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-white/60'" x-text="t('config.tab_advanced')"></button>
      </div>

      <!-- Content area -->
      <div class="flex-1 overflow-y-auto px-6 py-5 space-y-6">

        <!-- Basic: Model -->
        <div x-show="configTab === 'basic'">
          <h3 class="text-sm font-medium text-gray-700 mb-3 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 18a8 8 0 110-16 8 8 0 010 16z"/><path d="M12 6v6l4 2"/></svg>
            <span x-text="t('config.model')"></span>
          </h3>
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs text-gray-500 mb-1" x-text="t('config.default_model')"></label>
                <input type="text" x-model="config.model.default" class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent" placeholder="e.g. gpt-4" />
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1" x-text="t('config.provider')"></label>
                <input type="text" x-model="config.model.provider" class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent" placeholder="e.g. openai" />
              </div>
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1" x-text="t('config.base_url')"></label>

            <div>

          </h3>
          <div class="space-y-4">

                <label class="flex items-center gap-2 cursor-pointer">
