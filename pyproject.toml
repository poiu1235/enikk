[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "enikk"
version = "0.1.0"
description = "The CLI for NIKKE: Goddess of Victory"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "websockets>=14.0",
    "opencv-python>=4.9",
    "numpy>=1.26",
    "psutil>=5.9",
    "pywin32>=306",
    "rapidocr-onnxruntime>=1.3",
    "pyyaml>=6.0",
    "pyautogui>=0.9",
    "pynput>=1.7",
    "cryptography>=41.0",
    "ultralytics>=8.0",
    "hermes-agent @ git+https://github.com/NousResearch/hermes-agent.git@v2026.5.7",
    "textual>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.scripts]
enikk = "enikk.cli:main"

[tool.setuptools.packages.find]
include = ["enikk*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
log_cli = true
log_level = "DEBUG"
